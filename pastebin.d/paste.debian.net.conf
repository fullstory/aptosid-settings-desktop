# pastebinit configuration for paste.debian.net
#
# Installed to /etc/xdg/pastebin.d, which pastebinit searches after
# /usr/share/pastebin.d, so it overrides the broken package default.
[pastebin]
basename = paste.debian.net
https = True
post_page = api/v1/paste
post_format = json
paste_regexp = "id":"([0-9a-f]+)"
target_page = hidden/
user_length = 10

[format]
user = poster
content = code
format = lang
expiry = expire

[defaults]
expiry = 86400
