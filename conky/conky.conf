-- aptosid system-information panel.
--
-- White text on a rounded, semi-transparent dark panel in the top-right of the
-- desktop, showing an inxi summary. To customise, copy this file to
-- ~/.config/conky/conky.conf and edit it there -- the launcher prefers a user
-- config when one exists.
--
-- Rendered through the X11 backend (Xwayland on Wayland sessions): conky's
-- native Wayland backend needs wlr-layer-shell (not exposed by KWin/Mutter) and
-- the rounded panel is drawn with a Cairo Xlib surface, which is X11-only. The
-- compositor still composites the window's ARGB transparency.

conky.config = {
    out_to_x = true,
    out_to_wayland = false,

    alignment = "top_right",
    xinerama_head = 0,                    -- clamp to primary head; alignment is relative to it
    gap_x = 24,
    gap_y = 20,

    own_window = true,
    own_window_type = "normal",
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 0,            -- window base transparent; panel is drawn by Lua
    own_window_colour = "000000",
    own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",

    -- rounded translucent panel drawn behind the text
    lua_load = "/usr/share/aptosid-settings-conky/conky-bg.lua",
    lua_draw_hook_pre = "draw_bg",

    double_buffer = true,
    background = false,
    update_interval = 60,

    border_inner_margin = 12,
    border_outer_margin = 0,

    use_xft = true,
    font = "monospace:size=11",
    override_utf8_locale = true,
    default_color = "white",
    minimum_width = 5,
    no_buffers = true,
};

conky.text = [[
${execi 60 inxi --tty -SCMGNDIz -x}
]];
