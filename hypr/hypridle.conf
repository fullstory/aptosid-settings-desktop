# aptosid default hypridle config (system default via hyprutils /etc/xdg
# search). Started by hypridle.service; fll-live-boot masks it for a
# passwordless autologin live user. No auto-suspend by design.
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

listener {
    timeout    = 300                 # lock after 5 minutes
    on-timeout = loginctl lock-session
}

listener {
    timeout    = 360                 # display off after 6 minutes
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
