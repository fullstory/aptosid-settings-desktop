# aptosid default hyprlock config (system default via hyprutils /etc/xdg
# search). Colours follow the session palette (blue #5555ff, magenta #ff55ff).
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    hide_cursor        = true
    ignore_empty_input = true
}

background {
    monitor     =
    path        = /usr/share/wallpapers/aptosid-nemesis-wide.png
    blur_passes = 2
    blur_size   = 4
    color       = rgb(1d1d2e)
}

input-field {
    monitor          =
    size             = 260, 50
    outline_thickness = 2
    dots_center      = true
    outer_color      = rgb(5555ff)
    inner_color      = rgb(1a1a1a)
    font_color       = rgb(d8d8d8)
    check_color      = rgb(ff55ff)
    fail_color       = rgb(9c2220)
    fade_on_empty    = true
    placeholder_text = <i>Password…</i>
    position         = 0, -20
    halign           = center
    valign           = center
}

# Clock
label {
    monitor     =
    text        = $TIME
    font_family = Noto Sans
    font_size   = 64
    color       = rgb(d8d8d8)
    position    = 0, 120
    halign      = center
    valign      = center
}

# Date
label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B %Y"
    font_family = Noto Sans
    font_size   = 20
    color       = rgb(93a1a1)
    position    = 0, 60
    halign      = center
    valign      = center
}
