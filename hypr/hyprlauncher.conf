# aptosid hyprlauncher config (system default via hyprutils /etc/xdg search).
# Colours, fonts and icons come from hyprtoolkit.conf.
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlauncher/

general {
    # Show the app list on open, instead of an empty box until you type.
    # Restores the at-a-glance feel of the previous wofi setup.
    show_apps_on_open = true
}

finders {
    # Launch apps through uwsm so they land in the systemd-managed session
    # with correct scopes, like the rest of this uwsm session.
    desktop_launch_prefix = uwsm app --

    # Run Terminal= .desktop entries in the session terminal.
    desktop_terminal = kitty -e

    # Show application icons next to results.
    desktop_icons = true
}

ui {
    # Roomier than the 400x260 default so more results fit.
    window_size = 600 420
}
