# aptosid hyprtoolkit theme (system default via hyprutils /etc/xdg search).
# Drives the look of hyprtoolkit apps such as hyprlauncher. Colours follow the
# session palette (dark base #1d1d2e, blue #5555ff, magenta #ff55ff), fonts and
# icons match the GTK/gsettings defaults.
# https://wiki.hypr.land/Hypr-Ecosystem/hyprtoolkit/

# Colours are 0xAARRGGBB.
background       = 0xFF1D1D2E
base             = 0xFF26263A
alternate_base   = 0xFF2E2E46
text             = 0xFFD8D8D8
bright_text      = 0xFFEFF0F1
link_text        = 0xFF7AA2FF
accent           = 0xFF5555FF
accent_secondary = 0xFFFF55FF

rounding_large = 10
rounding_small = 5

font_family           = Noto Sans
font_family_monospace = Noto Mono
font_size             = 11

# Match the session icon theme so app icons render in results.
icon_theme = Mint-Y-Purple
